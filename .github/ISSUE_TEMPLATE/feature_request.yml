name: Feature request
description: Propose a focused product or extension improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: Describe the decision or workflow that is difficult today.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Approval and safety impact
      description: State whether this reads project/external data or changes state.
    validations:
      required: true
